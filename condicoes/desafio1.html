<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nacionalidade</title>
    <style>
        body {
            background-color: black;
            color: white;
            font-family: 'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif;
        }
    </style>
</head>
<body>
    <h1>Sistema de Identificação de Nacionalidade</h1>
    País: <input type="text" name="txtnac" id="txtnac">
    <input type="button" value="Verificar" onclick="calcular()">
    <div id="res"></div>

    <script>
        function calcular() {
            let txtnac = document.querySelector('input#txtnac')
            let res = document.querySelector('div#res')
            let nac = (txtnac.value)
            res.innerHTML = `<p>Vivendo em <strong>${nac}</strong></p>`

            if (nac === 'Brasil') {
                res.innerHTML += `Você é brasileiro!`
            } else {
                res.innerHTML += `<p>Você é estrangeiro!</p>`
            }
        }
    </script>
</body>
</html>
